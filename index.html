<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digaf MFI - Advanced Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 antialiased">

    <div class="max-w-6xl mx-auto p-6">
        <header class="flex justify-between items-center mb-8 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-xl font-bold text-slate-800">Digaf MFI Pro</h1>
                <p class="text-xs text-emerald-600 font-bold" id="sync-status">Cloud Live Sync Active</p>
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="exportToCSV()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-emerald-700">📥 EXPORT CSV</button>
                <select id="active-officer" onchange="saveOfficer()" class="bg-slate-100 px-3 py-2 rounded-lg text-xs font-bold text-purple-700 border border-slate-200 cursor-pointer">
                    <option value="Kidus">Kidus</option>
                    <option value="Samuel">Samuel</option>
                    <option value="Suraphel">Suraphel</option>
                    <option value="Natnael">Natnael</option>
                    <option value="Ezana">Ezana</option>
                    <option value="Zewdneh">Zewdneh</option>
                </select>
            </div>
        </header>

        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm mb-6 flex space-x-4">
            <input type="text" id="client-name" placeholder="የደንበኛ ሙሉ ስም..." class="flex-1 px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-purple-500">
            <select id="custom-status" class="px-4 py-2 border border-slate-200 rounded-lg focus:outline-none">
                <option value="Renewal">🟡 Renewal</option>
                <option value="Paid">🟢 Paid</option>
                <option value="No Response">🔴 No Response</option>
                <option value="Complete">🔵 Complete</option>
            </select>
            <button onclick="registerClient()" class="bg-purple-600 text-white px-6 py-2 rounded-lg font-bold text-sm">መዝግብ</button>
        </div>

        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-3 text-xs font-bold text-slate-500 uppercase">ደንበኛ</th>
                        <th class="px-6 py-3 text-xs font-bold text-slate-500 uppercase">ስታተስ</th>
                        <th class="px-6 py-3 text-xs font-bold text-slate-500 uppercase">ድርጊት (Actions)</th>
                    </tr>
                </thead>
                <tbody id="ledger-rows" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://logercqzvkwfibaumcvf.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_aWSqUZw9NaQDS6yDcwJhJw_79ZERzZ4";
        let globalRecords = [];

        // 1. ኦፊሰርን መቆለፍ (Persistent)
        function saveOfficer() {
            localStorage.setItem('activeOfficer', document.getElementById('active-officer').value);
        }

        window.onload = () => {
            const saved = localStorage.getItem('activeOfficer');
            if(saved) document.getElementById('active-officer').value = saved;
            fetchRecordsFromCloud();
        };

        // 2. መረጃ ማጥፊያ
        async function deleteRecord(id) {
            if(!confirm("እርግጠኛ ነዎት ይህን መረጃ መሰረዝ ይፈልጋሉ?")) return;
            await fetch(`${SUPABASE_URL}/rest/v1/digaf_records?id=eq.${id}`, {
                method: 'DELETE',
                headers: {'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`}
            });
            fetchRecordsFromCloud();
        }

        // 3. ስም ማስተካከያ (Edit Name)
        async function editName(id, currentName) {
            const newName = prompt("አዲሱን ስም ያስገቡ:", currentName);
            if (!newName || newName === currentName) return;
            await fetch(`${SUPABASE_URL}/rest/v1/digaf_records?id=eq.${id}`, {
                method: 'PATCH',
                headers: {'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json'},
                body: JSON.stringify({ name: newName })
            });
            fetchRecordsFromCloud();
        }

        // 4. ኤክሴል ማውረጃ (Export)
        function exportToCSV() {
            let csv = "Name,Status,Officer,Time\n";
            globalRecords.forEach(r => csv += `${r.name},${r.status},${r.created_by},${r.timestamp}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'Digaf_Report.csv');
            a.click();
        }

        // ነባር የኮድ ክፍል (Fetching and Rendering)
        async function fetchRecordsFromCloud() {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/digaf_records?select=*`, {
                headers: {'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`}
            });
            globalRecords = await response.json();
            renderLedger();
        }

        function renderLedger() {
            const tbody = document.getElementById('ledger-rows');
            tbody.innerHTML = '';
            globalRecords.forEach(r => {
                tbody.innerHTML += `
                    <tr>
                        <td class="px-6 py-4 font-bold">${r.name}</td>
                        <td class="px-6 py-4 text-xs font-bold">${r.status}</td>
                        <td class="px-6 py-4 space-x-2">
                            <button onclick="editName('${r.id}', '${r.name}')" class="text-blue-600 hover:underline text-xs">Edit</button>
                            <button onclick="deleteRecord('${r.id}')" class="text-red-600 hover:underline text-xs">Delete</button>
                        </td>
                    </tr>`;
            });
        }
        
        // Register function remains same as before...
        async function registerClient() {
            const name = document.getElementById('client-name').value;
            const status = document.getElementById('custom-status').value;
            const officer = document.getElementById('active-officer').value;
            
            await fetch(`${SUPABASE_URL}/rest/v1/digaf_records`, {
                method: 'POST',
                headers: {'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json'},
                body: JSON.stringify({ id: 'id_' + Date.now(), name, status, created_by: officer, timestamp: new Date().toLocaleString() })
            });
            fetchRecordsFromCloud();
        }
    </script>
</body>
</html>
